---
- name: Install common packages
  ansible.builtin.apt:
    name:
      - curl
      - git
      - ca-certificates
      - bash-completion
      - apt-transport-https
      - gnupg
      - lsb-release
      - software-properties-common
      - python3-pip
      - openssh-server
      - nfs-common
    state: present
    update_cache: true

- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  when: ansible_swaptotal_mb | int > 0
  changed_when: ansible_swaptotal_mb | int > 0

- name: Disable swap in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^(?!#)(.*\sswap\s+sw\s+.*)$'
    replace: '# \1'

- name: Ensure kernel modules are loaded now
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist required kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    mode: '0644'
    content: |
      overlay
      br_netfilter

- name: Configure sysctl for Kubernetes networking
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-kubernetes-cri.conf
    mode: '0644'
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

- name: Apply sysctl settings
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Ensure K3s config directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: '0755'

- name: Configure K3s registry mirror for Nexus Docker registry
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/registries.yaml
    mode: '0644'
    content: |
      mirrors:
        "{{ nexus_registry_host }}":
          endpoint:
            - "http://{{ nexus_registry_host }}"
      configs:
        "{{ nexus_registry_host }}":
          tls:
            insecure_skip_verify: true
  register: k3s_registries_yaml

- name: Check whether K3s server service exists
  ansible.builtin.shell: |
    systemctl list-unit-files k3s.service --no-legend | awk '{print $1}' | grep -qx k3s.service
  register: k3s_server_service
  changed_when: false
  failed_when: false
  when: "'control_plane' in group_names"

- name: Check whether K3s agent service exists
  ansible.builtin.shell: |
    systemctl list-unit-files k3s-agent.service --no-legend | awk '{print $1}' | grep -qx k3s-agent.service
  register: k3s_agent_service
  changed_when: false
  failed_when: false
  when: "'workers' in group_names"

- name: Restart K3s server when registry config changed on an existing node
  ansible.builtin.systemd:
    name: k3s
    state: restarted
  when:
    - k3s_registries_yaml.changed
    - "'control_plane' in group_names"
    - k3s_server_service is defined
    - k3s_server_service.rc == 0

- name: Restart K3s agent when registry config changed on an existing node
  ansible.builtin.systemd:
    name: k3s-agent
    state: restarted
  when:
    - k3s_registries_yaml.changed
    - "'workers' in group_names"
    - k3s_agent_service is defined
    - k3s_agent_service.rc == 0
