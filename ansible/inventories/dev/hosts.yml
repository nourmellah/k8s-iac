all:
  vars:
    ansible_user: vagrant
    ansible_ssh_private_key_file: ~/.vagrant.d/insecure_private_key
    ansible_become: true
    k3s_server_ip: 192.168.56.10
  children:
    control_plane:
      hosts:
        cp1:
          ansible_host: 192.168.56.10
    workers:
      hosts:
        worker-app-1:
          ansible_host: 192.168.56.11
          k3s_node_labels:
            - workload=app
        worker-app-2:
          ansible_host: 192.168.56.12
          k3s_node_labels:
            - workload=app
            - storage=mysql
    tools:
      hosts:
        worker-ci:
          ansible_host: 192.168.56.13
    ci:
      hosts:
        worker-ci:
    app:
      hosts:
        worker-app-1:
        worker-app-2:
